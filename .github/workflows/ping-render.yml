name: Keep Render Awake

on:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render App
        run: curl -fsS --retry 3 --max-time 10 "https://market-pipeline.onrender.com/health" || exit 1
