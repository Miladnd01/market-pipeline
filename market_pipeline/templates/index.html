<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
  <title>© Milan Bikineh · Market Terminal Pro</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- ✅ CSS FIX -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>

<body>

<div id="toast">
  <div class="toast-in">
    <i class="fa-solid fa-check"></i>
    <span id="toast-msg"></span>
  </div>
</div>

<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-r">
      <div class="brand">
        <div class="b-icon"><i class="fa-solid fa-chart-line"></i></div>
        <div>
          <div class="b-name mono">MARKET TERMINAL PRO</div>
          <div class="b-sub mono">Live Market · Pipeline · Tables</div>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:6px">
        <div class="owner-badge">
          <i class="fa-regular fa-copyright"></i>Milan Bikineh
        </div>
        <div class="tb-acts">
          <button class="ib" id="refreshBtn">
            <i class="fa-solid fa-rotate-right" id="ref-ic"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="chips">
      <div class="chip">
        <span class="dot" id="s-dot" style="background:var(--green)"></span>
        <span id="s-lbl">ONLINE</span>
      </div>
      <div class="chip">
        <i class="fa-regular fa-clock"></i>
        <span id="s-time">--:--:--</span>
      </div>
      <div class="chip">
        <i class="fa-solid fa-layer-group"></i>
        <span id="s-symbols">6 SYMBOLS</span>
      </div>
      <div class="chip" id="chip-load" style="display:none">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <span id="chip-load-lbl">Lädt…</span>
      </div>
    </div>
  </div>

  <!-- SCREENS -->
  <div id="screens">

    <section class="screen active" id="scr-market">
      <div class="card">
        <div class="ch">
          <div>
            <div class="kk">Compare Chart</div>
            <div class="ht mono">3 Lines · Mouse/Touch Price</div>
          </div>
        </div>

        <div class="cb">
          <div class="seg-row">
            <div class="pill-group" id="mode-pg">
              <button class="pb on" data-mode="real">REAL</button>
              <button class="pb" data-mode="norm">NORMALIZED</button>
            </div>

            <div class="pill-group" id="range-pg">
              <button class="pb on" data-range="24h">24H</button>
              <button class="pb" data-range="12h">12H</button>
              <button class="pb" data-range="6h">6H</button>
              <button class="pb" data-range="3h">3H</button>
              <button class="pb" data-range="1h">1H</button>
            </div>
          </div>

          <div class="chart-btns">
            <button class="gb" id="resetZoomBtn">Reset Zoom</button>
            <button class="gb" id="fitViewBtn">Fit View</button>
          </div>

          <div class="sym-row" id="sym-row">
            <button class="sym-pill on" data-sym="AAPL">AAPL</button>
            <button class="sym-pill on" data-sym="MSFT">MSFT</button>
            <button class="sym-pill on" data-sym="GOOGL">GOOGL</button>
          </div>
        </div>

        <div class="chart-outer">
          <canvas id="mainChart"></canvas>
        </div>

        <div class="chart-legend" id="chart-legend"></div>
      </div>
    </section>

    <section class="screen" id="scr-pipe">
      <div class="card">
        <div class="ch">
          <div>
            <div class="kk">Reliability</div>
            <div class="ht mono">API Success</div>
          </div>
        </div>

        <div class="cb" style="text-align:center">
          <canvas id="ringChart"></canvas>
          <div id="ring-pct">99%</div>
        </div>
      </div>
    </section>

    <section class="screen" id="scr-tables">
      <div class="card">
        <div id="db-tree">Loading...</div>
      </div>
    </section>

  </div>

  <div id="nav">
    <div class="nav-inner">
      <div class="nb on" data-nav="market">Market</div>
      <div class="nb" data-nav="pipe">Pipeline</div>
      <div class="nb" data-nav="tables">Tables</div>
    </div>
  </div>

</div>

<!-- ✅ JS FIX -->
<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
