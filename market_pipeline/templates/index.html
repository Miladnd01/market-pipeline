<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<title>© Milan Bikineh · Market Terminal Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
button,select,input{font-family:inherit;outline:none;-webkit-appearance:none;border:none;background:none;}

:root{
  --bg:#060c14;--bg2:#081018;--panel:#0a1520;--panel2:#0d1a28;
  --border:#1b2d42;--border2:#132030;
  --txt:#e0ecff;--soft:#8aa4c8;--muted:#4e6886;--faint:#344d66;
  --blue:#3b82f6;--cyan:#22d3ee;--green:#22c55e;--red:#ef4444;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:"IBM Plex Sans",sans-serif;-webkit-font-smoothing:antialiased;}
.mono{font-family:"IBM Plex Mono",monospace;}

#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
#topbar{
  flex-shrink:0;z-index:20;
  padding:calc(var(--sat) + 10px) calc(var(--sar) + 14px) 10px calc(var(--sal) + 14px);
  background:rgba(6,12,20,.97);border-bottom:1px solid var(--border2);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.tb-r{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;}
.b-icon{width:36px;height:36px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,rgba(59,130,246,.22),rgba(59,130,246,.06));border:1px solid rgba(59,130,246,.32);display:flex;align-items:center;justify-content:center;color:#93c5fd;font-size:15px;}
.b-name{font-size:13px;font-weight:800;letter-spacing:.07em;color:#eef4ff;}
.b-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.tb-acts{display:flex;gap:6px;}
.ib{width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--panel);color:var(--soft);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;transition:transform .1s;}
.ib:active{transform:scale(.93);}
.chips{display:flex;gap:5px;margin-top:8px;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:99px;border:1px solid var(--border);background:var(--panel);font-size:9px;font-weight:700;color:var(--soft);white-space:nowrap;font-family:"IBM Plex Mono",monospace;}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

/* SCREEN CONTAINER */
#screens{flex:1;overflow:hidden;position:relative;}
.screen{
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:10px;
  display:flex;flex-direction:column;gap:10px;
  visibility:hidden;opacity:0;pointer-events:none;
  transform:translateX(40px);
  transition:opacity .22s ease,transform .22s ease,visibility .22s;
}
.screen.active{visibility:visible;opacity:1;pointer-events:auto;transform:translateX(0);}

/* BOTTOM NAV */
#nav{
  flex-shrink:0;z-index:20;
  padding:5px calc(var(--sar) + 8px) calc(var(--sab) + 5px) calc(var(--sal) + 8px);
  background:rgba(6,12,20,.98);border-top:1px solid var(--border2);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
}
.nav-inner{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.nb{border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:13px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:all .12s;font-family:"IBM Plex Mono",monospace;}
.nb:active{transform:scale(.96);}
.nb.on{color:#bfdbfe;border-color:rgba(59,130,246,.35);background:linear-gradient(170deg,rgba(59,130,246,.18),rgba(59,130,246,.07));}
.nb i{font-size:17px;}

/* CARDS */
.card{
  background:linear-gradient(160deg,var(--panel),var(--bg2));
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  flex-shrink:0;
}
.ch{padding:11px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.cb{padding:12px 14px;}
.kk{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-family:"IBM Plex Mono",monospace;}
.ht{font-size:15px;font-weight:800;margin-top:3px;line-height:1.2;}

/* OWNER BADGE */
.owner-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px 4px 7px;border-radius:99px;
  border:1px solid rgba(59,130,246,.28);
  background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(59,130,246,.04));
  font-size:10px;font-weight:700;
  font-family:"IBM Plex Mono",monospace;
  color:#93c5fd;white-space:nowrap;flex-shrink:0;
}
.owner-badge i{font-size:9px;color:#60a5fa;}

/* FOOTER CREDIT */
.footer-credit{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px calc(4px);
  font-size:10px;font-weight:600;
  font-family:"IBM Plex Mono",monospace;
  color:var(--faint);letter-spacing:.04em;
  border-top:1px solid var(--border2);
  background:rgba(6,12,20,.6);
}
.footer-credit span{color:var(--muted);}
.footer-credit strong{color:#4e7aac;font-weight:800;}

/* ══════════ TABLE VIEWER ══════════ */
.tv-header{
  overflow:visible !important;
  box-shadow:0 10px 24px rgba(0,0,0,.18);
}
.tv-header-inner{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border2);}
.tv-back-btn{width:34px;height:34px;border-radius:10px;flex-shrink:0;background:var(--panel2);border:1px solid var(--border);color:var(--soft);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .1s;}
.tv-back-btn:active{transform:scale(.93);}
.tv-title-block{flex:1;min-width:0;}
.tv-table-name{font-size:15px;font-weight:800;color:var(--txt);}
.tv-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.tv-type-badge{font-size:9px;font-weight:800;font-family:"IBM Plex Mono",monospace;padding:3px 9px;border-radius:99px;flex-shrink:0;}
.tv-quickstats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--border2);}
.tv-qs-item{padding:9px 12px;border-right:1px solid var(--border2);display:flex;flex-direction:column;gap:2px;}
.tv-qs-item:last-child{border-right:none;}
.tv-qs-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:"IBM Plex Mono",monospace;}
.tv-qs-val{font-size:14px;font-weight:800;font-family:"IBM Plex Mono",monospace;}

/* Filter-Panel */
.tv-filter-toggle{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;}
.tv-toggle-arrow{font-size:10px;color:var(--muted);transition:transform .18s;flex-shrink:0;}
.tv-toggle-arrow.open{transform:rotate(180deg);}
.tv-filter-body{padding:12px 14px 14px;border-top:1px solid var(--border2);flex-direction:column;gap:10px;}
.tv-filter-fields{display:flex;gap:8px;flex-wrap:wrap;}
.tv-filter-btns{display:flex;gap:8px;justify-content:flex-end;}
.tv-af-tag{
  font-size:9px;font-weight:800;font-family:"IBM Plex Mono",monospace;
  padding:3px 8px;border-radius:99px;background:rgba(59,130,246,.15);
  border:1px solid rgba(59,130,246,.3);color:#93c5fd;display:inline-flex;align-items:center;gap:4px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}

.tv-data-card{
  overflow:hidden;
  border-color:rgba(59,130,246,.18);
}
.tv-data-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border2);flex-wrap:wrap;}
.tv-data-info{font-size:10px;color:var(--muted);white-space:nowrap;font-family:"IBM Plex Mono",monospace;}
.tv-page-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tv-pg-btn{width:28px;height:28px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--soft);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;transition:all .1s;}
.tv-pg-btn:active{background:#111e30;}
.tv-pg-btn:disabled{opacity:.3;cursor:default;}
.tv-pg-num{font-size:10px;color:var(--soft);white-space:nowrap;font-family:"IBM Plex Mono",monospace;}
.tv-table-wrap{
  overflow-x:auto;overflow-y:auto;max-height:400px;min-height:160px;-webkit-overflow-scrolling:touch;
  background:linear-gradient(180deg,rgba(255,255,255,.01),rgba(255,255,255,.005));
}
.tv-table-wrap::-webkit-scrollbar{height:4px;width:4px;}
.tv-table-wrap::-webkit-scrollbar-thumb{background:#1b2d42;border-radius:99px;}

table.tv-tbl{border-collapse:collapse;width:max-content;min-width:100%;font-size:11px;font-family:"IBM Plex Mono",monospace;}
table.tv-tbl thead th{
  position:sticky;top:0;z-index:3;
  background:#06101c;padding:8px 14px;text-align:left;
  font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
  border-bottom:2px solid var(--border);white-space:nowrap;
  cursor:pointer;transition:background .1s;user-select:none;
}
table.tv-tbl thead th:hover{background:#091525;}
table.tv-tbl thead th.sort-asc::after{content:" ▲";font-size:8px;color:#60a5fa;}
table.tv-tbl thead th.sort-desc::after{content:" ▼";font-size:8px;color:#60a5fa;}
table.tv-tbl thead th.th-pk{color:#fde68a;}
table.tv-tbl thead th.th-fk{color:#93c5fd;}
table.tv-tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .06s;}
table.tv-tbl tbody tr:hover{background:rgba(59,130,246,.09);}
table.tv-tbl tbody tr.tr-even{background:rgba(255,255,255,.012);}
table.tv-tbl tbody td{padding:7px 14px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;color:var(--soft);}
table.tv-tbl tbody td.td-pk{color:#fde68a;font-weight:700;}
table.tv-tbl tbody td.td-fk{color:#93c5fd;}
table.tv-tbl tbody td.td-null{color:var(--faint);font-style:italic;}
table.tv-tbl tbody td.td-true{color:#4ade80;}
table.tv-tbl tbody td.td-false{color:#f87171;}
table.tv-tbl tbody td.td-num{color:#fcd34d;}

.tv-pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;flex-wrap:wrap;border-top:1px solid var(--border2);}
.tv-pg-pill{min-width:30px;height:28px;padding:0 8px;border-radius:8px;font-size:10px;font-weight:800;font-family:"IBM Plex Mono",monospace;background:var(--panel2);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.tv-pg-pill.on{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4);color:#bfdbfe;}
.tv-pg-dots{font-size:11px;color:var(--faint);padding:0 4px;}

.dbl-item{
  display:grid;grid-template-columns:20px 1fr auto auto 20px;gap:8px;align-items:center;padding:11px 13px;border-radius:12px;
  background:var(--panel2);border:1px solid var(--border2);cursor:pointer;transition:all .12s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
}
.dbl-item:active{transform:scale(.99);}
.dbl-item:hover{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.07);}
.dbl-icon{font-size:12px;color:#60a5fa;}
.dbl-name{font-size:12px;font-weight:800;font-family:"IBM Plex Mono",monospace;color:var(--txt);}
.dbl-desc{font-size:9px;color:var(--muted);margin-top:2px;font-family:"IBM Plex Mono",monospace;}
.dbl-count{font-size:9px;font-family:"IBM Plex Mono",monospace;color:var(--faint);white-space:nowrap;}
.dbl-arrow{font-size:11px;color:var(--faint);}

/* DB EXPLORER */
.db-topbar{display:flex;align-items:center;gap:7px;padding:10px 12px 9px;border-bottom:1px solid var(--border2);flex-wrap:wrap;}
.db-title-row{display:flex;align-items:center;gap:6px;flex:1;}
.db-pg-badge{background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.3);color:#93c5fd;font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;font-family:"IBM Plex Mono",monospace;white-space:nowrap;}
.db-title{font-size:12px;font-weight:800;font-family:"IBM Plex Mono",monospace;color:var(--soft);}
.db-search{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--txt);font-size:11px;font-family:"IBM Plex Mono",monospace;}
.db-search::placeholder{color:var(--faint);}
.db-search:focus{border-color:rgba(59,130,246,.45);outline:none;}

.db-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px;}
.db-stat{background:var(--panel2);border:1px solid var(--border2);border-radius:11px;padding:9px 10px;text-align:center;}
.db-stat-val{font-size:16px;font-weight:800;font-family:"IBM Plex Mono",monospace;}
.db-stat-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;font-family:"IBM Plex Mono",monospace;}

/* Filter fields */
.sf-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px;}
.sf-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:"IBM Plex Mono",monospace;}
.sf-input,.sf-select{
  background:#050d18;border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;color:var(--txt);font-size:11px;
  font-family:"IBM Plex Mono",monospace;width:100%;
  transition:border-color .12s;
}
.sf-input:focus,.sf-select:focus{outline:none;border-color:rgba(59,130,246,.5);}
.sf-input::placeholder{color:var(--faint);}
.sf-date-row{display:flex;gap:6px;align-items:center;}
.sf-date-row span{font-size:10px;color:var(--muted);font-family:"IBM Plex Mono",monospace;}
.sf-btn-row{display:flex;gap:8px;justify-content:flex-end;padding-top:4px;}
.sf-btn-apply{
  padding:7px 16px;border-radius:9px;
  background:rgba(59,130,246,.22);border:1px solid rgba(59,130,246,.4);
  color:#bfdbfe;font-size:10px;font-weight:800;cursor:pointer;
  font-family:"IBM Plex Mono",monospace;transition:background .1s;
}
.sf-btn-apply:active{background:rgba(59,130,246,.35);}
.sf-btn-reset{
  padding:7px 14px;border-radius:9px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--muted);font-size:10px;font-weight:800;cursor:pointer;
  font-family:"IBM Plex Mono",monospace;transition:background .1s;
}
.sf-btn-reset:active{background:rgba(255,255,255,.08);}

.dbt-type.dim{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.25);}
.dbt-type.fact{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.22);}
.dbt-type.log{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.22);}

/* Loading Spinner */
.loading-spinner{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-family:"IBM Plex Mono",monospace;font-size:11px;gap:8px;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:#3b82f6;border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.error-msg{padding:20px;text-align:center;color:#f87171;font-family:"IBM Plex Mono",monospace;font-size:11px;}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div class="tb-r">
      <div class="brand">
        <div class="b-icon"><i class="fa-solid fa-chart-column"></i></div>
        <div>
          <div class="b-name mono">MKT TERMINAL</div>
          <div class="b-sub mono">Live DB · Real-time Data</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="owner-badge"><i class="fa-regular fa-copyright"></i>Milan Bikineh</div>
        <div class="tb-acts">
          <button class="ib" id="refreshBtn"><i class="fa-solid fa-rotate-right" id="ref-ic"></i></button>
        </div>
      </div>
    </div>
    <div class="chips">
      <div class="chip"><span class="dot" id="s-dot" style="background:var(--green)"></span><span id="s-lbl">CONNECTED</span></div>
      <div class="chip"><i class="fa-regular fa-clock"></i><span id="s-time">--</span></div>
      <div class="chip"><i class="fa-solid fa-database"></i><span id="s-db">PostgreSQL</span></div>
    </div>
  </div>

  <div id="screens">
    <!-- SCREEN: DATABASE — Tabellen-Auswahl -->
    <section class="screen active" id="scr-watch">
      <div class="card">
        <div class="db-stats">
          <div class="db-stat"><div class="db-stat-val mono" style="color:#c084fc" id="dim-count">--</div><div class="db-stat-lbl">DIM</div></div>
          <div class="db-stat"><div class="db-stat-val mono" style="color:#4ade80" id="fact-count">--</div><div class="db-stat-lbl">FACT</div></div>
          <div class="db-stat"><div class="db-stat-val mono" style="color:#fbbf24" id="log-count">--</div><div class="db-stat-lbl">LOG</div></div>
        </div>
      </div>
      <div class="card">
        <div class="db-topbar">
          <div class="db-title-row">
            <i class="fa-solid fa-database" style="color:#60a5fa;font-size:13px"></i>
            <span class="db-title">market_db</span>
            <span class="db-pg-badge">PostgreSQL</span>
          </div>
          <input class="db-search" id="db-search" placeholder="Tabelle suchen…" type="text"/>
        </div>
        <div id="db-tree" style="display:flex;flex-direction:column;gap:3px;padding:8px 10px;">
          <div class="loading-spinner"><div class="spinner"></div>Lädt Tabellen...</div>
        </div>
      </div>
    </section>

    <!-- SCREEN: TABLE VIEWER -->
    <section class="screen" id="scr-tableview">
      <div class="tv-header card">
        <div class="tv-header-inner">
          <button class="tv-back-btn" id="tv-back"><i class="fa-solid fa-arrow-left"></i></button>
          <div class="tv-title-block">
            <div class="tv-table-name mono" id="tv-tname">--</div>
            <div class="tv-meta mono" id="tv-tmeta">--</div>
          </div>
          <div class="tv-type-badge" id="tv-type-badge">--</div>
        </div>
        <div class="tv-quickstats" id="tv-quickstats"></div>
      </div>

      <!-- Zeitraum-Filter -->
      <div class="card" id="tv-filter-card">
        <div class="tv-filter-toggle" id="tv-filter-toggle">
          <i class="fa-solid fa-calendar-range" style="color:#60a5fa;font-size:11px"></i>
          <span class="kk" style="color:var(--soft)">Zeitraum-Filter</span>
          <div id="tv-active-filters" style="display:flex;gap:4px;flex-wrap:wrap;flex:1"></div>
          <i class="fa-solid fa-chevron-down tv-toggle-arrow" id="tv-toggle-arrow"></i>
        </div>
        <div class="tv-filter-body" id="tv-filter-body" style="display:none">
          <div class="tv-filter-fields">
            <div class="sf-field" style="flex:1;min-width:140px">
              <div class="sf-label">Von Datum</div>
              <input class="sf-input" type="date" id="tvf-datefrom" value="2026-01-01"/>
            </div>
            <div class="sf-field" style="flex:1;min-width:140px">
              <div class="sf-label">Bis Datum</div>
              <input class="sf-input" type="date" id="tvf-dateto" value="2026-03-28"/>
            </div>
          </div>
          <div class="sf-btn-row">
            <button class="sf-btn-reset" id="tv-filter-reset">↺ Zurücksetzen</button>
            <button class="sf-btn-apply" id="tv-filter-apply">▶ Filtern</button>
          </div>
        </div>
      </div>

      <!-- Datentabelle + Pagination -->
      <div class="card tv-data-card">
        <div class="tv-data-toolbar">
          <span class="tv-data-info mono" id="tv-data-info">-- Zeilen</span>
          <div class="tv-page-ctrl">
            <button class="tv-pg-btn" id="tv-pg-prev"><i class="fa-solid fa-chevron-left"></i></button>
            <span class="tv-pg-num mono" id="tv-pg-num">1 / 1</span>
            <button class="tv-pg-btn" id="tv-pg-next"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
        </div>
        <div class="tv-table-wrap" id="tv-table-wrap">
          <div style="padding:40px;text-align:center;color:var(--faint);font-family:'IBM Plex Mono',monospace;font-size:11px">
            Tabelle auswählen…
          </div>
        </div>
        <div class="tv-pagination" id="tv-pagination"></div>
      </div>
    </section>
  </div>

  <div class="footer-credit">
    <i class="fa-regular fa-copyright" style="font-size:10px;color:#3b82f6"></i>
    <strong>Milan Bikineh</strong>
    <span>· All Rights Reserved · 2025</span>
  </div>

  <div id="nav">
    <div class="nav-inner">
      <div class="nb on" data-nav="watch"><i class="fa-solid fa-database"></i><span>Schema</span></div>
    </div>
  </div>
</div>

<script>
/* ═══════════ CONFIG ═══════════ */
const API_BASE = '/api';

/* ═══════════ NAVIGATION ═══════════ */
let activeNav = "watch";
let busy = false;

function setNav(id){
  if(id === activeNav || busy) return;
  busy = true;

  const prevEl = document.getElementById(id === "tableview" ? "scr-watch" : "scr-tableview");
  const nextEl = document.getElementById(id === "tableview" ? "scr-tableview" : "scr-watch");

  if(!prevEl || !nextEl){busy = false; return;}

  prevEl.classList.remove("active");
  nextEl.classList.add("active");

  setTimeout(() => {busy = false;}, 240);
  activeNav = id;
}

document.getElementById("tv-back").addEventListener("click", () => setNav("watch"));

/* ═══════════ API CALLS ═══════════ */
async function fetchTables(){
  try {
    const res = await fetch(`${API_BASE}/tables`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(err) {
    console.error("Fehler beim Laden der Tabellen:", err);
    return null;
  }
}

async function fetchTableData(tableName, page = 1, pageSize = 50, filters = {}){
  try {
    const params = new URLSearchParams({
      page: page,
      page_size: pageSize,
      ...filters
    });
    const res = await fetch(`${API_BASE}/table/${tableName}?${params}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(err) {
    console.error(`Fehler beim Laden von ${tableName}:`, err);
    return null;
  }
}

/* ═══════════ RENDER DB TREE ═══════════ */
async function renderDbTree(filter = ""){
  const tree = document.getElementById("db-tree");
  if(!tree) return;

  tree.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>Lädt Tabellen...</div>';

  const tables = await fetchTables();

  if(!tables || !tables.tables){
    tree.innerHTML = '<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> Verbindung zur Datenbank fehlgeschlagen</div>';
    return;
  }

  const dims = tables.tables.filter(t => t.type === 'dim').length;
  const facts = tables.tables.filter(t => t.type === 'fact').length;
  const logs = tables.tables.filter(t => t.type === 'log').length;

  document.getElementById("dim-count").textContent = dims;
  document.getElementById("fact-count").textContent = facts;
  document.getElementById("log-count").textContent = logs;

  const q = (filter || "").toLowerCase().trim();
  const filtered = q ? tables.tables.filter(t => t.name.toLowerCase().includes(q)) : tables.tables;

  tree.innerHTML = filtered.map(t => {
    const typeLabel = t.type === "dim" ? "DIM" : t.type === "fact" ? "FACT" : "LOG";
    const typeCl = t.type;
    const rowCount = Number(t.row_count || 0);

    return `<div class="dbl-item" data-tname="${t.name}">
      <i class="fa-solid fa-table-cells dbl-icon"></i>
      <div>
        <div class="dbl-name">${t.name}</div>
        <div class="dbl-desc">${t.description || 'Keine Beschreibung'} · ${t.column_count} Spalten</div>
      </div>
      <span class="dbt-type ${typeCl}">${typeLabel}</span>
      <span class="dbl-count">${rowCount.toLocaleString()}</span>
      <i class="fa-solid fa-chevron-right dbl-arrow"></i>
    </div>`;
  }).join("");

  tree.querySelectorAll(".dbl-item").forEach(item => {
    item.addEventListener("click", () => openTableViewer(item.dataset.tname));
  });
}

document.getElementById("db-search").addEventListener("input", e => renderDbTree(e.target.value));

/* ═══════════ TABLE VIEWER ═══════════ */
const PAGE_SIZE = 50;
let TV = {
  tableName: null,
  page: 1,
  totalPages: 1,
  totalRows: 0,
  sortCol: null,
  sortDir: 'desc',
  dateFrom: "2026-01-01",
  dateTo: "2026-03-28"
};

async function openTableViewer(tableName){
  TV.tableName = tableName;
  TV.page = 1;
  TV.sortCol = null;
  TV.sortDir = 'desc';

  document.getElementById("tv-tname").textContent = tableName;

  let type = "FACT", typeCl = "fact";
  if(tableName.startsWith("dim_")){type = "DIM"; typeCl = "dim";}
  else if(tableName.startsWith("log_")){type = "LOG"; typeCl = "log";}

  const badge = document.getElementById("tv-type-badge");
  badge.textContent = type;
  badge.className = `tv-type-badge dbt-type ${typeCl}`;

  setNav("tableview");
  await loadTableData();
}

async function loadTableData(){
  const wrap = document.getElementById("tv-table-wrap");
  wrap.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>Lädt Daten...</div>';

  const filters = {
    date_from: TV.dateFrom || undefined,
    date_to: TV.dateTo || undefined,
    sort_col: TV.sortCol || undefined,
    sort_dir: TV.sortDir || 'desc'
  };

  const data = await fetchTableData(TV.tableName, TV.page, PAGE_SIZE, filters);

  if(!data){
    wrap.innerHTML = '<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> Fehler beim Laden der Daten</div>';
    return;
  }

  TV.totalRows = data.total;
  TV.totalPages = Math.max(1, Math.ceil(data.total / PAGE_SIZE));
  TV.page = Math.min(TV.page, TV.totalPages);

  document.getElementById("tv-tmeta").textContent = `${data.total.toLocaleString()} Zeilen · ${data.columns.length} Spalten`;

  document.getElementById("tv-quickstats").innerHTML = `
    <div class="tv-qs-item"><div class="tv-qs-lbl">Records</div><div class="tv-qs-val mono" style="color:#4ade80">${data.total.toLocaleString()}</div></div>
    <div class="tv-qs-item"><div class="tv-qs-lbl">Spalten</div><div class="tv-qs-val mono" style="color:#93c5fd">${data.columns.length}</div></div>
    <div class="tv-qs-item"><div class="tv-qs-lbl">Seite</div><div class="tv-qs-val mono" style="color:#fbbf24">${TV.page}/${TV.totalPages}</div></div>
    <div class="tv-qs-item"><div class="tv-qs-lbl">Zeige</div><div class="tv-qs-val mono" style="color:#c084fc">${data.rows.length}</div></div>`;

  const start = (TV.page - 1) * PAGE_SIZE;
  document.getElementById("tv-data-info").textContent =
    `${data.total.toLocaleString()} Zeilen · Seite ${TV.page} von ${TV.totalPages} · Records ${start + 1}–${Math.min(start + PAGE_SIZE, data.total)}`;
  document.getElementById("tv-pg-num").textContent = `${TV.page} / ${TV.totalPages}`;

  renderTable(data);
  renderPagination();

  const prev = document.getElementById("tv-pg-prev");
  const next = document.getElementById("tv-pg-next");
  prev.disabled = TV.page <= 1;
  next.disabled = TV.page >= TV.totalPages;
}

function renderTable(data){
  const wrap = document.getElementById("tv-table-wrap");

  const thead = data.columns.map(c => {
    const cls = c.is_pk ? "th-pk" : c.is_fk ? "th-fk" : "";
    const sortCls = TV.sortCol === c.name ? (TV.sortDir === "asc" ? "sort-asc" : "sort-desc") : "";
    const icon = c.is_pk ? "🔑 " : c.is_fk ? "🔗 " : "";
    return `<th class="${cls} ${sortCls}" data-col="${c.name}">${icon}${c.name}</th>`;
  }).join("");

  const tbody = data.rows.map((row, ri) => {
    const cells = data.columns.map(c => {
      const val = row[c.name];
      let txt, cls = "";

      if(val === null || val === undefined){
        txt = "NULL";
        cls = "td-null";
      } else if(typeof val === "boolean"){
        txt = val ? "true" : "false";
        cls = val ? "td-true" : "td-false";
      } else if(typeof val === "number"){
        txt = Number(val).toLocaleString("en-US", {maximumFractionDigits: 4});
        cls = c.is_pk ? "td-pk" : c.is_fk ? "td-fk" : "td-num";
      } else {
        txt = String(val);
        cls = c.is_pk ? "td-pk" : c.is_fk ? "td-fk" : "";
      }

      return `<td class="${cls}" title="${txt}">${txt}</td>`;
    }).join("");

    return `<tr class="${ri % 2 === 0 ? "" : "tr-even"}">${cells}</tr>`;
  }).join("") || `<tr><td colspan="${data.columns.length}" style="text-align:center;color:var(--faint);padding:20px">Keine Daten</td></tr>`;

  wrap.innerHTML = `<table class="tv-tbl"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;

  wrap.querySelectorAll("th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if(TV.sortCol === col){
        TV.sortDir = TV.sortDir === "asc" ? "desc" : "asc";
      } else {
        TV.sortCol = col;
        TV.sortDir = "desc";
      }
      TV.page = 1;
      loadTableData();
    });
  });
}

function renderPagination(){
  const el = document.getElementById("tv-pagination");
  const p = TV.page, tp = TV.totalPages;

  if(tp <= 1){
    el.innerHTML = "";
    return;
  }

  let pills = [];
  const addPill = n => {
    if(n < 1 || n > tp) return;
    pills.push(`<button class="tv-pg-pill${n === p ? " on" : ""}" data-p="${n}">${n}</button>`);
  };
  const addDots = () => pills.push(`<span class="tv-pg-dots">…</span>`);

  addPill(1);
  if(p > 4) addDots();
  for(let i = Math.max(2, p - 2); i <= Math.min(tp - 1, p + 2); i++) addPill(i);
  if(p < tp - 3) addDots();
  addPill(tp);

  el.innerHTML = pills.join("");

  el.querySelectorAll(".tv-pg-pill[data-p]").forEach(pill => {
    pill.addEventListener("click", () => {
      TV.page = +pill.dataset.p;
      loadTableData();
    });
  });
}

/* ═══════════ FILTER ═══════════ */
document.getElementById("tv-filter-toggle").addEventListener("click", () => {
  const body = document.getElementById("tv-filter-body");
  const arrow = document.getElementById("tv-toggle-arrow");
  const open = body.style.display === "flex";
  body.style.display = open ? "none" : "flex";
  arrow.classList.toggle("open", !open);
});

document.getElementById("tv-filter-apply").addEventListener("click", () => {
  TV.dateFrom = document.getElementById("tvf-datefrom").value;
  TV.dateTo = document.getElementById("tvf-dateto").value;
  TV.page = 1;

  const tags = [];
  if(TV.dateFrom) tags.push(`<span class="tv-af-tag">Von: ${TV.dateFrom}</span>`);
  if(TV.dateTo) tags.push(`<span class="tv-af-tag">Bis: ${TV.dateTo}</span>`);
  document.getElementById("tv-active-filters").innerHTML = tags.join("");

  loadTableData();
});

document.getElementById("tv-filter-reset").addEventListener("click", () => {
  document.getElementById("tvf-datefrom").value = "2026-01-01";
  document.getElementById("tvf-dateto").value = "2026-03-28";
  TV.dateFrom = "2026-01-01";
  TV.dateTo = "2026-03-28";
  TV.page = 1;
  document.getElementById("tv-active-filters").innerHTML = "";
  loadTableData();
});

/* ═══════════ PAGINATION ═══════════ */
document.getElementById("tv-pg-prev").addEventListener("click", () => {
  if(TV.page > 1){
    TV.page--;
    loadTableData();
  }
});

document.getElementById("tv-pg-next").addEventListener("click", () => {
  if(TV.page < TV.totalPages){
    TV.page++;
    loadTableData();
  }
});

/* ═══════════ REFRESH ═══════════ */
let spinning = false;
document.getElementById("refreshBtn").addEventListener("click", () => {
  if(spinning) return;
  spinning = true;

  const ic = document.getElementById("ref-ic");
  ic.style.transition = "transform .6s";
  ic.style.transform = "rotate(360deg)";

  if(activeNav === "watch") renderDbTree();
  else if(activeNav === "tableview") loadTableData();

  setTimeout(() => {
    ic.style.transform = "";
    ic.style.transition = "";
    spinning = false;
  }, 700);
});

/* ═══════════ TOPBAR TIME ═══════════ */
setInterval(() => {
  document.getElementById("s-time").textContent = new Date().toLocaleTimeString("de-DE", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}, 1000);

/* ═══════════ BOOT ═══════════ */
renderDbTree();
</script>
</body>
</html>
