<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Market Intelligence v3 - Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        body { background: #020617; color: #f1f5f9; }
        .card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid #1e293b; border-radius: 1.5rem; }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #10b981); -webkit-background-clip: text; color: transparent; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-black gradient-text">ANALYTICS ENGINE</h1>
                <p class="text-slate-500 font-mono text-sm">Status: <span id="sync-status" class="text-emerald-400">Synchronized</span></p>
            </div>
            <div class="flex gap-4">
                <div class="card px-6 py-3 flex flex-col items-center">
                    <span class="text-[10px] text-slate-500 uppercase">Success Rate</span>
                    <span id="stat-success" class="text-xl font-bold text-emerald-400">--%</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-8 space-y-6">
                <div class="card p-6">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">📈 Market Price Intervals (24h)</h2>
                    <div class="h-[400px]">
                        <canvas id="mainPriceChart"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="card p-6">
                        <h3 class="text-sm font-bold text-slate-400 uppercase mb-4">API Latency Trend</h3>
                        <div class="h-48">
                            <canvas id="latencyChart"></canvas>
                        </div>
                    </div>
                    <div class="card p-6">
                        <h3 class="text-sm font-bold text-slate-400 uppercase mb-4">Assets Overview</h3>
                        <div id="quoteTable" class="space-y-3">
                            </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="card p-6 border-blue-500/30">
                    <h3 class="font-bold mb-4">System Architecture</h3>
                    <div class="space-y-4 relative">
                        <div class="p-3 bg-blue-500/10 border border-blue-500/20 rounded-xl text-xs">
                            <span class="text-blue-400 font-bold uppercase">Ingestion</span><br>Finnhub & Twelve Data API
                        </div>
                        <div class="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-xs">
                            <span class="text-emerald-400 font-bold uppercase">Processing</span><br>Python Gthread Worker
                        </div>
                        <div class="p-3 bg-purple-500/10 border border-purple-500/20 rounded-xl text-xs text-center font-mono italic">
                            PostgreSQL Storage Layer
                        </div>
                    </div>
                </div>

                <div class="card p-6">
                    <h3 class="text-sm font-bold text-slate-400 uppercase mb-4">Distribution</h3>
                    <div class="h-64">
                        <canvas id="distributionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let priceChart, latencyChart, distChart;

        function setupCharts() {
            // Preis-Kurven-Diagramm
            const pCtx = document.getElementById('mainPriceChart').getContext('2d');
            priceChart = new Chart(pCtx, {
                type: 'line',
                data: { datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { type: 'time', time: { unit: 'hour' }, grid: { display: false } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' } }
                    },
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } }
                }
            });

            // Latenz-Diagramm
            const lCtx = document.getElementById('latencyChart').getContext('2d');
            latencyChart = new Chart(lCtx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'ms', data: [], borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function updateData() {
            const response = await fetch('/api/dashboard');
            const data = await response.json();

            // Stats Update
            document.getElementById('stat-success').innerText = data.stats.success_rate + '%';

            // Kurven Update (Prices)
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];
            priceChart.data.datasets = Object.keys(data.history).map((sym, i) => ({
                label: sym,
                data: data.history[sym],
                borderColor: colors[i % colors.length],
                borderWidth: 3,
                pointRadius: 0,
                tension: 0.3
            }));
            priceChart.update();

            // Latenz Update
            latencyChart.data.labels = data.latency_history.map(h => h.t);
            latencyChart.data.datasets[0].data = data.latency_history.map(h => h.ms);
            latencyChart.update();

            // Tabelle Update
            document.getElementById('quoteTable').innerHTML = data.quotes.map(q => `
                <div class="flex justify-between items-center p-3 hover:bg-white/5 rounded-xl transition-all">
                    <div>
                        <span class="font-bold text-blue-400">${q.symbol}</span>
                        <span class="text-[10px] text-slate-500 ml-2">${q.time}</span>
                    </div>
                    <div class="text-right">
                        <div class="font-mono">$${q.price.toFixed(2)}</div>
                        <div class="text-xs ${q.change >= 0 ? 'text-emerald-400' : 'text-red-400'}">${q.change.toFixed(2)}%</div>
                    </div>
                </div>
            `).join('');
        }

        setupCharts();
        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
