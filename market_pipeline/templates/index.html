<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Terminal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: #e6eaf2;
}

.container {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.sidebar {
    width: 250px;
    background: #0f1626;
    padding: 15px;
    border-right: 1px solid #1c2333;
}

.symbol {
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 6px;
    background: #141c2f;
    cursor: pointer;
}

.symbol.active {
    background: #1f2a44;
}

.symbol span {
    display: block;
    font-size: 12px;
    opacity: 0.7;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* CARDS */
.card {
    background: #121a2b;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.metric {
    font-size: 18px;
    font-weight: bold;
}

.small {
    font-size: 12px;
    opacity: 0.6;
}

/* RIGHT PANEL */
.right {
    width: 300px;
    background: #0f1626;
    padding: 15px;
    border-left: 1px solid #1c2333;
}

.circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 8px solid #00c853;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin: auto;
}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="sidebar" id="symbolList"></div>

    <!-- MAIN -->
    <div class="main">

        <div class="card">
            <h2 id="symbolTitle">--</h2>
            <div class="small" id="companyName">--</div>
        </div>

        <div class="card grid">
            <div>
                <div class="small">Price</div>
                <div class="metric" id="price">--</div>
            </div>
            <div>
                <div class="small">Change</div>
                <div class="metric" id="change">--</div>
            </div>
            <div>
                <div class="small">RSI</div>
                <div class="metric" id="rsi">--</div>
            </div>
            <div>
                <div class="small">MACD</div>
                <div class="metric" id="macd">--</div>
            </div>
        </div>

        <div class="card">
            <canvas id="chart" height="120"></canvas>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="card">
            <h3>API Success</h3>
            <div class="circle" id="successRate">--%</div>
        </div>

        <div class="card">
            <h3>Pipeline</h3>
            <div id="pipelinePhase">--</div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let selectedSymbol = null;
let chart = null;

function safe(v, fallback="--") {
    return (v === null || v === undefined) ? fallback : v;
}

function loadDashboard() {
    fetch("/api/dashboard")
    .then(res => res.json())
    .then(data => {

        const rows = data.dashboard_rows || [];
        const history = data.history || {};

        // Sidebar
        const list = document.getElementById("symbolList");
        list.innerHTML = "";

        rows.forEach(r => {
            const div = document.createElement("div");
            div.className = "symbol";

            div.innerHTML = `
                <strong>${safe(r.symbol)}</strong>
                <span>${safe(r.current_price)}</span>
            `;

            div.onclick = () => {
                selectedSymbol = r.symbol;
                renderMain(r, history[r.symbol]);
            };

            list.appendChild(div);
        });

        // default select
        if (!selectedSymbol && rows.length > 0) {
            selectedSymbol = rows[0].symbol;
            renderMain(rows[0], history[rows[0].symbol]);
        }

        // Right panel
        document.getElementById("successRate").innerText =
            safe(data.stats.success_rate, 0) + "%";

        document.getElementById("pipelinePhase").innerText =
            safe(data.pipeline.phase);

    })
    .catch(err => console.error(err));
}

function renderMain(row, series) {

    document.getElementById("symbolTitle").innerText = safe(row.symbol);
    document.getElementById("companyName").innerText = safe(row.company_name);

    document.getElementById("price").innerText = safe(row.current_price);
    document.getElementById("change").innerText = safe(row.change_pct);
    document.getElementById("rsi").innerText = safe(row.rsi_14);
    document.getElementById("macd").innerText = safe(row.macd);

    // Chart
    if (!series || series.length === 0) return;

    const labels = series.map(x => x.x);
    const values = series.map(x => x.y);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: row.symbol,
                data: values,
                borderColor: "#00c853",
                fill: false
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            }
        }
    });
}

// Auto refresh
setInterval(loadDashboard, 10000);

// initial load
loadDashboard();

</script>

</body>
</html>
